<!DOCTYPE html>
<html>
<head>
  <title>My Bio</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    video {
      position: fixed;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      text-align: center;
      font-size: 30px;
    }

    button {
      padding: 10px 20px;
      font-size: 20px;
    }
  </style>
</head>

<body>

<video autoplay muted loop>
  <source src="bg.mp4" type="video/mp4">
</video>

<audio id="music" loop>
  <source src="song.mp3" type="audio/mp3">
</audio>

<div class="content">
  <div>🔥 My Cool Page 🔥</div>
  <button onclick="playMusic()">Enter</button>
</div>

<script>
function playMusic() {
  document.getElementById("music").play();
}
</script>

</body>
</html>
